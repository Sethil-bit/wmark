<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Watermark · Pro · Live Preview</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Playfair+Display:ital@0;1&family=Roboto+Mono&family=Montserrat:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;600&family=Oswald:wght@400;600&family=Raleway:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    body {
      background: radial-gradient(circle at 10% 20%, #0d1225, #05080f);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    .app-card {
      max-width: 1480px;
      width: 100%;
      background: rgba(16, 22, 40, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 3.5rem;
      padding: 2.5rem 2.8rem 3rem;
      box-shadow: 0 30px 60px -12px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.02);
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #eef3ff;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.1rem;
    }
    h1 i { color: #6a89ff; }
    .subhead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      color: #8d96c0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      padding-bottom: 1rem;
    }
    .subhead span {
      background: rgba(255,255,255,0.02);
      padding: 0.3rem 1.4rem;
      border-radius: 60px;
      font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .grid-2col {
      display: grid;
      grid-template-columns: 1.3fr 2.2fr;
      gap: 2.8rem;
    }
    @media (max-width: 1000px) {
      .grid-2col { grid-template-columns: 1fr; gap: 2rem; }
      .app-card { padding: 1.8rem; }
    }
    /* left panel */
    .controls {
      background: rgba(8, 13, 28, 0.5);
      border-radius: 2.4rem;
      padding: 2rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.02);
      backdrop-filter: blur(4px);
    }
    .control-group { margin-bottom: 1.8rem; }
    .control-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8f99cc;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }
    .control-group input[type="text"],
    .control-group input[type="number"],
    .control-group input[type="color"],
    .control-group select {
      width: 100%;
      padding: 0.8rem 1.2rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 60px;
      color: #f0f4ff;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    .control-group select option { background: #1a2140; }
    .control-group input:focus, .control-group select:focus {
      border-color: #5d7cff;
      box-shadow: 0 0 0 3px rgba(93,124,255,0.15);
    }
    .row-duo {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .row-duo .control-group { flex: 1; min-width: 100px; }
    .color-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .color-row input[type="color"] {
      width: 54px;
      height: 54px;
      padding: 0;
      border-radius: 60px;
      border: 2px solid rgba(255,255,255,0.06);
      background: none;
      cursor: pointer;
    }
    .color-row input[type="text"] { flex: 1; }
    .file-zone {
      background: rgba(0,0,0,0.25);
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      text-align: center;
      border: 2px dashed rgba(255,255,255,0.06);
      transition: 0.2s;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .file-zone:hover { border-color: #5d7cff; background: rgba(93,124,255,0.04); }
    .file-zone i { font-size: 2.6rem; color: #5d7cff; margin-bottom: 0.3rem; }
    .file-zone p { color: #b7c0e6; font-weight: 400; }
    .file-zone .small { font-size: 0.8rem; color: #6f78a3; margin-top: 0.4rem; }
    .badge {
      background: #283053;
      padding: 0.2rem 1.2rem;
      border-radius: 60px;
      color: #bcc6f0;
      font-size: 0.8rem;
      display: inline-block;
      margin-top: 0.8rem;
    }
    .action-buttons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-top: 1.8rem;
    }
    .btn {
      flex: 1;
      padding: 0.9rem 1rem;
      border: none;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #262f54;
      color: #d3dcff;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid rgba(255,255,255,0.02);
      min-width: 100px;
    }
    .btn-primary { background: #5d7cff; color: white; box-shadow: 0 6px 16px rgba(93,124,255,0.2); }
    .btn-primary:hover { background: #4b6af0; transform: scale(0.97); }
    .btn-success { background: #2eaa6e; color: white; box-shadow: 0 6px 16px rgba(46,170,110,0.15); }
    .btn-success:hover { background: #24985f; }
    .btn-warning { background: #b45338; color: white; }
    .btn-outline { background: transparent; border: 1px solid #3e4a72; color: #b3bde6; }
    .btn-outline:hover { background: #1f2742; }
    .btn:disabled { opacity: 0.4; pointer-events: none; filter: grayscale(0.5); }
    /* right panel */
    .gallery-panel {
      background: rgba(8, 13, 28, 0.3);
      border-radius: 2.4rem;
      padding: 1.8rem;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.02);
      min-height: 400px;
    }
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      color: #b3bde6;
    }
    .gallery-header span {
      background: #1b2342;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 1.2rem;
      max-height: 560px;
      overflow-y: auto;
      padding-right: 0.2rem;
    }
    .image-grid::-webkit-scrollbar { width: 4px; }
    .image-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.01); border-radius: 10px; }
    .image-grid::-webkit-scrollbar-thumb { background: #3e4a72; border-radius: 10px; }
    .image-card {
      background: rgba(0,0,0,0.4);
      border-radius: 1.5rem;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.03);
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .image-card .index-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: #ced8ff;
      font-size: 0.6rem;
      padding: 0.1rem 0.6rem;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .empty-gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: #5b6691;
      gap: 0.5rem;
    }
    .empty-gallery i { font-size: 4rem; opacity: 0.3; }
    .toast-message {
      margin-top: 1.5rem;
      padding: 0.8rem 1.5rem;
      background: #171f3d;
      border-radius: 60px;
      border-left: 5px solid #5d7cff;
      color: #c8d2ff;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.9rem;
    }
    .toast-message i { color: #5d7cff; }
    /* preview section - ENHANCED */
    .preview-section {
      margin-top: 1.2rem;
      border-radius: 1.8rem;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
      background: rgba(0,0,0,0.3);
      position: relative;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1.2rem;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .preview-header .preview-label {
      font-size: 0.7rem;
      color: #8a9ed9;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .preview-header .preview-label i { color: #5d7cff; }
    .preview-header .preview-info {
      font-size: 0.65rem;
      color: #5b6691;
    }
    .preview-container {
      position: relative;
      width: 100%;
      background: #0b0e1a;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-container canvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: 280px;
      object-fit: contain;
      background: #0b0e1a;
    }
    .preview-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #5b6691;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .preview-placeholder i {
      font-size: 2rem;
      opacity: 0.3;
      display: block;
      margin-bottom: 0.3rem;
    }
    .preview-badge {
      position: absolute;
      bottom: 8px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      padding: 0.15rem 0.8rem;
      border-radius: 40px;
      font-size: 0.55rem;
      color: #8a9ed9;
      border: 1px solid rgba(255,255,255,0.03);
      pointer-events: none;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="app-card">
  <h1><i class="fas fa-water"></i> Bulk Watermark · Pro</h1>
  <div class="subhead">
    <span><i class="fas fa-images"></i> up to 50 · lossless · original size</span>
    <span><i class="fas fa-eye"></i> live preview · real-time</span>
  </div>

  <div class="grid-2col">
    <!-- left panel -->
    <div class="controls">
      <!-- text -->
      <div class="control-group">
        <label><i class="fas fa-font"></i> Watermark text</label>
        <input type="text" id="watermarkText" value="© MyStudio" placeholder="e.g. © MyBrand">
      </div>

      <!-- font + color -->
      <div class="row-duo">
        <div class="control-group">
          <label><i class="fas fa-italic"></i> Font</label>
          <select id="fontFamilySelect">
            <option value="Inter, sans-serif">Inter</option>
            <option value="'Playfair Display', serif">Playfair Display</option>
            <option value="'Roboto Mono', monospace">Roboto Mono</option>
            <option value="'Montserrat', sans-serif">Montserrat</option>
            <option value="'DM Serif Display', serif">DM Serif</option>
            <option value="'Space Grotesk', sans-serif">Space Grotesk</option>
            <option value="'Oswald', sans-serif">Oswald</option>
            <option value="'Raleway', sans-serif">Raleway</option>
          </select>
        </div>
        <div class="control-group">
          <label><i class="fas fa-palette"></i> Color</label>
          <div class="color-row">
            <input type="color" id="textColor" value="#ffffff">
            <input type="text" id="textColorHex" value="#ffffff">
          </div>
        </div>
      </div>

      <!-- size + opacity -->
      <div class="row-duo">
        <div class="control-group">
          <label><i class="fas fa-text-height"></i> Size (px)</label>
          <input type="number" id="fontSize" value="52" min="10" max="300">
        </div>
        <div class="control-group">
          <label><i class="fas fa-circle"></i> Opacity</label>
          <input type="number" id="opacitySlider" value="0.85" min="0.05" max="1.0" step="0.05">
        </div>
      </div>

      <!-- position -->
      <div class="row-duo">
        <div class="control-group">
          <label><i class="fas fa-arrow-left"></i> X %</label>
          <input type="number" id="posX" value="50" min="0" max="100" step="1">
        </div>
        <div class="control-group">
          <label><i class="fas fa-arrow-up"></i> Y %</label>
          <input type="number" id="posY" value="50" min="0" max="100" step="1">
        </div>
      </div>

      <!-- font style -->
      <div class="control-group">
        <label><i class="fas fa-italic"></i> Style</label>
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
          <button class="btn" id="styleNormal" style="flex:1; background:#20294a; padding:0.5rem;">Normal</button>
          <button class="btn" id="styleBold" style="flex:1; background:#20294a; padding:0.5rem;">Bold</button>
          <button class="btn" id="styleItalic" style="flex:1; background:#20294a; padding:0.5rem;">Italic</button>
        </div>
        <input type="hidden" id="fontStyleValue" value="normal">
      </div>

      <!-- file zone -->
      <div class="file-zone" id="fileDropZone">
        <i class="fas fa-cloud-upload-alt"></i>
        <p><strong>Drop images</strong> or click to browse</p>
        <p class="small">JPEG, PNG, WebP · max 50</p>
        <div class="badge" id="fileCountBadge">0 / 50</div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
      </div>

      <!-- ENHANCED PREVIEW SECTION -->
      <div class="preview-section">
        <div class="preview-header">
          <span class="preview-label"><i class="fas fa-eye"></i> LIVE PREVIEW</span>
          <span class="preview-info" id="previewStatus">real-time</span>
        </div>
        <div class="preview-container">
          <canvas id="previewCanvas" width="800" height="450"></canvas>
          <div class="preview-placeholder" id="previewPlaceholder">
            <i class="fas fa-edit"></i>
            <span>Adjust settings to preview</span>
          </div>
          <div class="preview-badge" id="previewBadge">demo</div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn btn-primary" id="applyWatermarkBtn"><i class="fas fa-stamp"></i> Watermark</button>
        <button class="btn btn-success" id="downloadAllBtn"><i class="fas fa-download"></i> Download</button>
        <button class="btn btn-warning" id="clearBtn"><i class="fas fa-trash-alt"></i> Clear</button>
      </div>

      <div id="toastContainer" class="toast-message">
        <i class="fas fa-info-circle"></i> <span id="toastText">Ready · upload images</span>
      </div>
    </div>

    <!-- right gallery -->
    <div class="gallery-panel">
      <div class="gallery-header">
        <span><i class="fas fa-layer-group"></i> Gallery</span>
        <span id="galleryCount">0</span>
      </div>
      <div class="image-grid" id="imageGrid">
        <div class="empty-gallery" id="emptyGallery">
          <i class="fas fa-image"></i>
          <p>No images loaded</p>
          <span style="font-size:0.8rem; color:#434e78;">Upload up to 50 images</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- state ----------
    let originalFiles = [];
    let processedBlobs = [];
    let processedURLs = [];
    const MAX_IMAGES = 50;
    let previewImageLoaded = false;
    let previewImageData = null; // store first uploaded image for preview

    // DOM refs
    const fileInput = document.getElementById('fileInput');
    const fileDropZone = document.getElementById('fileDropZone');
    const fileCountBadge = document.getElementById('fileCountBadge');
    const imageGrid = document.getElementById('imageGrid');
    const emptyGallery = document.getElementById('emptyGallery');
    const galleryCount = document.getElementById('galleryCount');
    const toastText = document.getElementById('toastText');

    const watermarkText = document.getElementById('watermarkText');
    const textColor = document.getElementById('textColor');
    const textColorHex = document.getElementById('textColorHex');
    const fontSize = document.getElementById('fontSize');
    const opacitySlider = document.getElementById('opacitySlider');
    const posX = document.getElementById('posX');
    const posY = document.getElementById('posY');
    const fontFamilySelect = document.getElementById('fontFamilySelect');
    const fontStyleValue = document.getElementById('fontStyleValue');

    const applyBtn = document.getElementById('applyWatermarkBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const clearBtn = document.getElementById('clearBtn');

    const styleNormal = document.getElementById('styleNormal');
    const styleBold = document.getElementById('styleBold');
    const styleItalic = document.getElementById('styleItalic');

    // preview elements
    const previewCanvas = document.getElementById('previewCanvas');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const previewBadge = document.getElementById('previewBadge');
    const previewStatus = document.getElementById('previewStatus');
    const ctx = previewCanvas.getContext('2d');

    // ---------- helpers ----------
    function updateFileBadge() {
      fileCountBadge.textContent = `${originalFiles.length} / ${MAX_IMAGES}`;
    }
    function updateGalleryCount() {
      galleryCount.textContent = originalFiles.length;
      if (originalFiles.length === 0) emptyGallery.style.display = 'flex';
      else emptyGallery.style.display = 'none';
    }
    function showToast(msg, isError = false) {
      toastText.textContent = msg;
      const container = document.getElementById('toastContainer');
      container.style.borderLeftColor = isError ? '#e35f5f' : '#5d7cff';
      container.style.background = isError ? '#2a1f2f' : '#171f3d';
    }

    function renderGallery() {
      document.querySelectorAll('.image-card').forEach(el => el.remove());
      if (originalFiles.length === 0) { emptyGallery.style.display = 'flex'; updateGalleryCount(); return; }
      emptyGallery.style.display = 'none';
      originalFiles.slice(0, MAX_IMAGES).forEach((file, idx) => {
        const card = document.createElement('div');
        card.className = 'image-card';
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.alt = file.name;
        const badge = document.createElement('div');
        badge.className = 'index-badge';
        badge.textContent = idx+1;
        card.appendChild(img);
        card.appendChild(badge);
        imageGrid.appendChild(card);
      });
      updateGalleryCount();
    }

    // ---------- DRAW PREVIEW (enhanced) ----------
    function drawPreview() {
      const text = watermarkText.value.trim() || '©';
      const color = textColor.value;
      const size = parseInt(fontSize.value, 10) || 52;
      const opacity = parseFloat(opacitySlider.value) || 0.85;
      const xPercent = parseFloat(posX.value) || 50;
      const yPercent = parseFloat(posY.value) || 50;
      const fontFamily = fontFamilySelect.value || 'Inter, sans-serif';
      let fontWeight = 'normal', fontStyle = 'normal';
      const styleVal = fontStyleValue.value;
      if (styleVal === 'bold') fontWeight = 'bold';
      else if (styleVal === 'italic') fontStyle = 'italic';
      else if (styleVal === 'bold italic') { fontWeight = 'bold'; fontStyle = 'italic'; }

      const canvas = previewCanvas;
      const w = canvas.width, h = canvas.height;

      // Clear and draw background
      ctx.clearRect(0, 0, w, h);
      
      // If we have a preview image from uploads, use it
      if (previewImageData) {
        const img = new Image();
        img.onload = function() {
          ctx.drawImage(img, 0, 0, w, h);
          drawWatermarkOnCanvas(ctx, w, h, text, color, size, fontFamily, fontWeight, fontStyle, opacity, xPercent, yPercent);
        };
        img.onerror = function() {
          drawDemoBackground(ctx, w, h);
          drawWatermarkOnCanvas(ctx, w, h, text, color, size, fontFamily, fontWeight, fontStyle, opacity, xPercent, yPercent);
        };
        img.src = previewImageData;
      } else {
        // Draw demo background
        drawDemoBackground(ctx, w, h);
        drawWatermarkOnCanvas(ctx, w, h, text, color, size, fontFamily, fontWeight, fontStyle, opacity, xPercent, yPercent);
        previewBadge.textContent = 'demo';
      }

      previewPlaceholder.classList.add('hidden');
      previewStatus.textContent = 'live ✓';
    }

    function drawDemoBackground(ctx, w, h) {
      // Nice gradient demo
      const grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, '#1a2444');
      grad.addColorStop(0.5, '#2a3a6a');
      grad.addColorStop(1, '#1a2444');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      
      // Add some decorative elements
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        ctx.arc(50 + i * 100, 50 + (i % 3) * 120, 40 + i * 10, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Sample text
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.font = '80px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🖼', w/2, h/2 - 10);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.font = '18px sans-serif';
      ctx.fillText('PREVIEW', w/2, h/2 + 60);
    }

    function drawWatermarkOnCanvas(ctx, w, h, text, color, size, fontFamily, fontWeight, fontStyle, opacity, xPercent, yPercent) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      let fontString = '';
      if (fontWeight === 'bold') fontString += 'bold ';
      if (fontStyle === 'italic') fontString += 'italic ';
      fontString += `${size}px ${fontFamily}`;
      ctx.font = fontString;
      ctx.globalAlpha = Math.min(1, Math.max(0, opacity));
      ctx.fillStyle = color;
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 16;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 3;

      const x = (xPercent / 100) * w;
      const y = (yPercent / 100) * h;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    // ---------- load preview from first uploaded image ----------
    function updatePreviewFromUploads() {
      if (originalFiles.length > 0) {
        const reader = new FileReader();
        reader.onload = function(e) {
          previewImageData = e.target.result;
          previewBadge.textContent = 'from upload';
          previewStatus.textContent = 'live ✓';
          drawPreview();
        };
        reader.readAsDataURL(originalFiles[0]);
      } else {
        previewImageData = null;
        previewBadge.textContent = 'demo';
        previewStatus.textContent = 'real-time';
        drawPreview();
      }
    }

    // ---------- core watermark ----------
    function applyWatermarkToFile(file, text, color, fontSizePx, fontFamily, fontWeight, fontStyle, opacity, xPercent, yPercent) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const width = img.width, height = img.height;
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let fontString = '';
            if (fontWeight === 'bold') fontString += 'bold ';
            if (fontStyle === 'italic') fontString += 'italic ';
            fontString += `${fontSizePx}px ${fontFamily}`;
            ctx.font = fontString;
            ctx.globalAlpha = Math.min(1, Math.max(0, opacity));
            ctx.fillStyle = color;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 14;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            const x = (xPercent / 100) * width;
            const y = (yPercent / 100) * height;
            ctx.fillText(text, x, y);
            ctx.shadowColor = 'transparent';
            ctx.globalAlpha = 1.0;

            const mimeType = file.type || 'image/png';
            canvas.toBlob(function(blob) {
              if (!blob) reject(new Error('Canvas toBlob failed'));
              else resolve({ blob, filename: file.name, originalSize: file.size, newSize: blob.size });
            }, mimeType, 1.0);
          };
          img.onerror = () => reject(new Error('Failed to load image'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('FileReader error'));
        reader.readAsDataURL(file);
      });
    }

    // ---------- process all ----------
    async function processAllImages() {
      if (originalFiles.length === 0) { showToast('No images to watermark', true); return; }

      const text = watermarkText.value.trim() || '©';
      const color = textColor.value;
      const size = parseInt(fontSize.value, 10) || 52;
      const opacity = parseFloat(opacitySlider.value) || 0.85;
      const x = parseFloat(posX.value) || 50;
      const y = parseFloat(posY.value) || 50;
      const fontFamily = fontFamilySelect.value || 'Inter, sans-serif';
      let fontWeight = 'normal', fontStyle = 'normal';
      const styleVal = fontStyleValue.value;
      if (styleVal === 'bold') fontWeight = 'bold';
      else if (styleVal === 'italic') fontStyle = 'italic';
      else if (styleVal === 'bold italic') { fontWeight = 'bold'; fontStyle = 'italic'; }

      applyBtn.disabled = true;
      applyBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';
      processedBlobs = [];
      processedURLs.forEach(u => URL.revokeObjectURL(u));
      processedURLs = [];

      try {
        for (let i = 0; i < originalFiles.length; i++) {
          const result = await applyWatermarkToFile(
            originalFiles[i], text, color, size, fontFamily, fontWeight, fontStyle, opacity, x, y
          );
          processedBlobs.push(result);
          showToast(`Watermarked ${i+1}/${originalFiles.length}`);
        }
        showToast(`✅ ${processedBlobs.length} images watermarked`);
        processedBlobs.forEach(item => {
          processedURLs.push(URL.createObjectURL(item.blob));
        });
      } catch (err) {
        showToast(`Error: ${err.message}`, true);
      } finally {
        applyBtn.disabled = false;
        applyBtn.innerHTML = '<i class="fas fa-stamp"></i> Watermark';
      }
    }

    // ---------- download ----------
    function downloadAll() {
      if (processedBlobs.length === 0) { showToast('Watermark first', true); return; }
      if (processedBlobs.length === 1) {
        const item = processedBlobs[0];
        const a = document.createElement('a');
        a.href = URL.createObjectURL(item.blob);
        a.download = `wm_${item.filename}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showToast('Downloaded 1 image');
        return;
      }
      let idx = 0;
      function next() {
        if (idx >= processedBlobs.length) { showToast(`Downloaded ${processedBlobs.length} images`); return; }
        const item = processedBlobs[idx];
        const a = document.createElement('a');
        a.href = URL.createObjectURL(item.blob);
        a.download = `wm_${item.filename}`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        idx++;
        setTimeout(next, 250);
      }
      next();
    }

    // ---------- clear ----------
    function clearAll() {
      originalFiles = [];
      processedBlobs = [];
      processedURLs.forEach(u => URL.revokeObjectURL(u));
      processedURLs = [];
      document.querySelectorAll('.image-card').forEach(el => el.remove());
      emptyGallery.style.display = 'flex';
      updateGalleryCount();
      updateFileBadge();
      fileInput.value = '';
      previewImageData = null;
      previewBadge.textContent = 'demo';
      previewStatus.textContent = 'real-time';
      showToast('Cleared all');
      drawPreview();
    }

    // ---------- file handling ----------
    function handleFiles(files) {
      const valid = Array.from(files).filter(f => f.type.startsWith('image/'));
      if (!valid.length) { showToast('No valid images', true); return; }
      const available = MAX_IMAGES - originalFiles.length;
      if (available <= 0) { showToast(`Max ${MAX_IMAGES} images`, true); return; }
      const toAdd = valid.slice(0, available);
      originalFiles = originalFiles.concat(toAdd);
      updateFileBadge();
      renderGallery();
      // Update preview with first uploaded image
      updatePreviewFromUploads();
      showToast(`Added ${toAdd.length} · total ${originalFiles.length}`);
      fileInput.value = '';
    }

    // ---------- event listeners ----------
    fileDropZone.addEventListener('click', () => fileInput.click());
    fileDropZone.addEventListener('dragover', (e) => { e.preventDefault(); fileDropZone.style.borderColor = '#5d7cff'; });
    fileDropZone.addEventListener('dragleave', () => { fileDropZone.style.borderColor = 'rgba(255,255,255,0.06)'; });
    fileDropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      fileDropZone.style.borderColor = 'rgba(255,255,255,0.06)';
      if (e.dataTransfer.files) handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files) handleFiles(e.target.files); });

    // color sync
    textColor.addEventListener('input', () => { textColorHex.value = textColor.value; drawPreview(); });
    textColorHex.addEventListener('input', () => { textColor.value = textColorHex.value; drawPreview(); });

    // all controls trigger preview
    watermarkText.addEventListener('input', drawPreview);
    fontSize.addEventListener('input', drawPreview);
    opacitySlider.addEventListener('input', drawPreview);
    posX.addEventListener('input', drawPreview);
    posY.addEventListener('input', drawPreview);
    fontFamilySelect.addEventListener('change', drawPreview);

    // font style buttons
    function setStyle(s) {
      fontStyleValue.value = s;
      [styleNormal, styleBold, styleItalic].forEach(b => b.style.background = '#20294a');
      if (s === 'normal') styleNormal.style.background = '#3a4670';
      else if (s === 'bold') styleBold.style.background = '#3a4670';
      else if (s === 'italic') styleItalic.style.background = '#3a4670';
      drawPreview();
    }
    styleNormal.addEventListener('click', () => setStyle('normal'));
    styleBold.addEventListener('click', () => setStyle('bold'));
    styleItalic.addEventListener('click', () => setStyle('italic'));
    setStyle('normal');

    applyBtn.addEventListener('click', processAllImages);
    downloadAllBtn.addEventListener('click', downloadAll);
    clearBtn.addEventListener('click', clearAll);

    // ---------- init ----------
    updateFileBadge();
    renderGallery();
    showToast('Ready · upload images · preview updates live');
    drawPreview();
  })();
</script>
</body>
</html>
